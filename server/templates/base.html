<!DOCTYPE html>
<html>
<head>
    <title>Super Ai</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">
        <div class="brand">
            <a href="/" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
                <div class="brand-icon">SA</div>
                <h1>Super <span>Ai</span></h1>
            </a>
        </div>
        <div class="header-actions">
            <button class="btn btn-log" onclick="location.href='/log'">Log</button>
            <label class="switch">
                <input type="checkbox" id="toggleSession" onchange="doToggle()">
                <span class="slider"></span>
            </label>
            <span id="statusLabel" class="status-text">Stopped</span>
        </div>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        Made with <span style="color: red;">&#10084;</span> by <a href="https://ecomsense.in">Ecomsense</a>
    </div>
    <script>
        async function doToggle() {
            const isChecked = document.getElementById('toggleSession').checked;
            await fetch(isChecked ? '/start' : '/stop', { method: 'POST' });
            setTimeout(() => location.reload(), 1500);
        }
        async function refreshButtons() {
            const res = await fetch('/status');
            const data = await res.json();
            const isRunning = data.status === 'Running';
            document.getElementById('toggleSession').checked = isRunning;
            document.getElementById('statusLabel').textContent = isRunning ? 'Running' : 'Stopped';
            document.getElementById('statusLabel').className = 'status-text ' + (isRunning ? 'running' : 'stopped');
        }
        refreshButtons();
        setInterval(refreshButtons, 5000);
    </script>
    {% block script %}{% endblock %}
</body>
</html>
