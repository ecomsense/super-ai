<!DOCTYPE html>
<html>
<head>
    <title>Super Ai</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        .header { background: #333; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 20px; }
        .header .buttons { display: flex; gap: 10px; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; border-radius: 4px; }
        .start { background: #28a745; color: white; }
        .stop { background: #dc3545; color: white; }
        .nav { background: #444; padding: 10px 20px; }
        .nav a { margin-right: 15px; color: #aaa; text-decoration: none; }
        .nav a:hover { color: white; }
        .content { padding: 20px; max-width: 800px; margin: 0 auto; }
        .footer { text-align: center; padding: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Super Ai</h1>
        <div class="buttons">
            <button class="start" id="btnStart" onclick="doAction('/start')">Start</button>
            <button class="stop" id="btnStop" onclick="doAction('/stop')">Stop</button>
        </div>
    </div>
    <div class="nav">
        <a href="/">Dashboard</a>
        <a href="/tmux">Tmux</a>
        <a href="/log">Log</a>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        Super Ai
    </div>
    <script>
        async function doAction(action) {
            await fetch(action, { method: 'POST' });
            setTimeout(refreshButtons, 1000);
        }
        async function refreshButtons() {
            const res = await fetch('/status');
            const data = await res.json();
            document.getElementById('btnStart').style.display = data.status === 'Running' ? 'none' : 'inline-block';
            document.getElementById('btnStop').style.display = data.status === 'Running' ? 'inline-block' : 'none';
        }
        refreshButtons();
        setInterval(refreshButtons, 5000);
    </script>
    {% block script %}{% endblock %}
</body>
</html>
