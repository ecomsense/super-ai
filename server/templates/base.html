<!DOCTYPE html>
<html>
<head>
    <title>Super Ai</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <div class="brand">
            <div class="brand-icon">SA</div>
            <h1>Super <span>Ai</span></h1>
        </div>
        <div class="header-actions">
            <button class="btn btn-log" onclick="location.href='/log'">Log</button>
            <button class="btn btn-start" id="btnStart" onclick="doAction('/start')">Start</button>
            <button class="btn btn-stop" id="btnStop" onclick="doAction('/stop')">Stop</button>
        </div>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        Made with &#10084; by <a href="https://ecomsense.in">Ecomsense</a>
    </div>
    <script>
        async function doAction(action) {
            await fetch(action, { method: 'POST' });
            setTimeout(() => location.reload(), 1500);
        }
        async function refreshButtons() {
            const res = await fetch('/status');
            const data = await res.json();
            document.getElementById('btnStart').style.display = data.status === 'Running' ? 'none' : 'inline-block';
            document.getElementById('btnStop').style.display = data.status === 'Running' ? 'inline-block' : 'none';
        }
        refreshButtons();
        setInterval(refreshButtons, 5000);
    </script>
    {% block script %}{% endblock %}
</body>
</html>
