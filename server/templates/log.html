{% extends "base.html" %}
{% block content %}
<pre id="content-area">Loading...</pre>
{% endblock %}
{% block script %}
<script>
async function refresh() {
    const res = await fetch('/log-data');
    const data = await res.json();
    document.getElementById('content-area').textContent = data.log;
}
refresh();
setInterval(refresh, 5000);
</script>
{% endblock %}
