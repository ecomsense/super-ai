<!DOCTYPE html>
<html>
<head>
    <title>Super AI - Log</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: monospace; padding: 10px; background: #1e1e1e; color: #ffaa00; }
        .nav { margin-bottom: 10px; }
        .nav a { margin-right: 15px; color: #007bff; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 14px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/" style="color: white;">Dashboard</a>
        <a href="/tmux" style="color: white;">Tmux</a>
        <a href="/log" style="color: white;">Log</a>
    </div>
    <pre id="log">Loading...</pre>

    <script>
        async function refresh() {
            const res = await fetch('/log-data');
            const data = await res.json();
            document.getElementById('log').textContent = data.log;
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
