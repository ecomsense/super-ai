{% extends "base.html" %}
{% block content %}
<pre id="tmux">{{ tmux }}</pre>
{% endblock %}
{% block script %}
<script>
async function refresh() {
    const res = await fetch('/tmux-data');
    const data = await res.json();
    document.getElementById('tmux').textContent = data.tmux;
}
refresh();
setInterval(refresh, 2000);
</script>
{% endblock %}
