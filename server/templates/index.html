{% extends "base.html" %}
{% block content %}
<div class="box">
<h3>Files</h3>
{% if files %}
    <table>
        <tr>
            <th>Name</th>
            <th>Size</th>
            <th>Actions</th>
        </tr>
        {% for f in files %}
        <tr>
            <td>{{ f.name }}</td>
            <td>{{ f.size }} bytes</td>
            <td>
                <a href="/file/{{ f.name }}">Edit</a>
                <a href="#" onclick="rename('{{ f.name }}')">Rename</a>
            </td>
        </tr>
        {% endfor %}
    </table>
{% else %}
    <p>No files found.</p>
{% endif %}
</div>
{% endblock %}
{% block script %}
<script>
async function rename(filename) {
    const newName = prompt('Enter new name:');
    if (newName) {
        await fetch('/rename', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({old: filename, new: newName})
        });
        location.reload();
    }
}
</script>
{% endblock %}
