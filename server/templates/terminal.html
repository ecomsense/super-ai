<!DOCTYPE html>
<html>
<head>
    <title>Super AI - Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <style>
        body { margin: 0; padding: 10px; background: #1e1e1e; }
        #terminal { height: 90vh; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script>
        const term = new Terminal({ cursorBlink: true, theme: { background: '#1e1e1e' }, fontSize: 14 });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        let lastLogs = '';

        async function refresh() {
            try {
                const res = await fetch('/stream-logs');
                const data = await res.json();
                if (data.logs !== lastLogs) {
                    term.clear();
                    term.write(data.logs.replace(/\n/g, '\r\n'));
                    lastLogs = data.logs;
                }
            } catch (e) {}
        }

        refresh();
        setInterval(refresh, 1000);
        window.addEventListener('resize', () => fitAddon.fit());
    </script>
</body>
</html>
